<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Huazheng Zeng - Academic Page</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="page">
        <header class="cv-header">
            <div class="cv-header-main">
                <h1 id="profile-name"></h1>
                <p id="profile-title" class="profile-subtitle"></p>
                <div id="contact-list" class="contact-row"></div>
            </div>
            <img id="profile-photo" class="cv-photo" src="" alt="Profile photo">
        </header>

        <section>
            <h2 class="section-title">About</h2>
            <div id="about-content"></div>
            <p id="interests-row" class="interests-row"></p>
        </section>

        <section>
            <h2 class="section-title">News</h2>
            <ul id="news-list" class="entry-list"></ul>
        </section>

        <section>
            <h2 class="section-title">Internships</h2>
            <ul id="internships-list" class="entry-list"></ul>
        </section>

        <section>
            <h2 class="section-title">Research Experience</h2>
            <ul id="research-list" class="entry-list"></ul>
        </section>

        <section>
            <h2 class="section-title">Projects</h2>
            <ul id="projects-list" class="entry-list"></ul>
        </section>

        <section>
            <h2 class="section-title">Publications</h2>
            <ul id="publications-list" class="entry-list"></ul>
        </section>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
